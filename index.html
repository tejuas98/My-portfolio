<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tejas Jaware | @rudrauo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@400;700;900&family=Space+Mono&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configure Tailwind to use our fonts and dark mode
        tailwind.config = {
            theme: {
                extend: {
                    colors: { background: '#e4dfd6' },
                    fontFamily: {
                        sans: ['"Space Grotesk"', 'sans-serif'],
                        mono: ['"Space Mono"', 'monospace'],
                        serif: ['"Playfair Display"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #e4dfd6;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            color: #1a1a1a; 
        }
    </style>
</head>

<body class="relative min-h-screen flex flex-col justify-center px-6 md:px-16 lg:px-32 overflow-hidden selection:bg-[#1a1a1a] selection:text-[#e4dfd6]">

    <!-- INTRO OVERLAY -->
    <div id="intro-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#e4dfd6] px-4">
        <!-- noise background -->
        <div class="absolute inset-0 opacity-[1] pointer-events-none" style="background-image: url(&quot;data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E&quot;);"></div>
        
        <div class="relative z-10 flex flex-col items-center px-4 w-full max-w-md">
            
            <!-- Warning Sticker -->
            <div class="bg-white p-2 rounded-2xl shadow-[0_10px_35px_rgba(0,0,0,0.15)] w-full mb-8 transform -rotate-2 hover:rotate-0 transition-transform duration-300">
                <div class="bg-[#ffcc00] rounded-xl overflow-hidden border-[3px] border-[#ffcc00] flex flex-col">
                    <div class="bg-black text-[#ffcc00] font-black text-4xl sm:text-5xl py-4 flex justify-center items-center gap-3 tracking-wide uppercase">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        WARNING
                    </div>
                    <div class="px-4 py-8 text-center">
                        <h2 class="text-black font-black text-4xl sm:text-[2.75rem] leading-[1.1] uppercase tracking-tight">A Very Tired<br>College Student</h2>
                    </div>
                </div>
            </div>

            <!-- Parental Advisory Sticker -->
            <div class="bg-white p-1 rounded shadow-xl mb-12 transform rotate-3 hover:-rotate-1 transition-transform duration-300">
                <div class="border-[3px] border-black bg-white w-48 text-center font-sans flex flex-col justify-between">
                    <div class="bg-black text-white font-bold text-[0.65rem] tracking-[0.2em] py-0.5 mt-1 mx-1">PARENTAL</div>
                    <div class="text-black font-black text-[2.25rem] leading-none py-1.5 px-2 tracking-tighter">ADVISORY</div>
                    <div class="bg-black text-white font-bold text-[0.55rem] tracking-[0.1em] py-0.5 mb-1 mx-1">EXPLICIT CONTENT</div>
                </div>
            </div>

            <!-- Start Button -->
            <button id="start-btn" class="bg-black text-white font-sans font-bold text-xl uppercase tracking-widest px-12 py-4 rounded-full shadow-[0_10px_30px_rgba(0,0,0,0.3)] hover:scale-105 hover:bg-[#ff9900] hover:text-black hover:shadow-[#ff9900]/40 transition-all duration-300">
                START
            </button>

        </div>
    </div>

    <div class="relative z-10 max-w-4xl">
        <div class="hero-element flex mb-4 relative ml-[-4px]">
            <!-- Kept the username font sans-serif via default, mapped to Space Grotesk -->
            <span class="bg-[#1a1a1a] text-[#e4dfd6] px-3 py-1 font-bold text-sm tracking-widest uppercase rounded-sm shadow-sm font-sans">
                - @RUDRAUO
            </span>
        </div>

        <h1 class="hero-element text-5xl md:text-6xl font-serif font-black mb-4 text-[#1a1a1a] tracking-tight">
            Tejas Jaware
        </h1>

        <div class="hero-element mb-8 inline-flex items-center font-sans font-bold text-xl md:text-2xl tracking-tighter bg-[#000000] p-1.5 rounded-md shadow-lg transform -rotate-2 hover:rotate-0 transition-transform duration-300 cursor-default">
            <span class="text-white px-2">Software</span>
            <span class="bg-[#ff9900] text-black px-2 py-0.5 rounded-sm ml-0.5">Engineer</span>
        </div>

        <p class="hero-element font-serif text-[#3a3a3a] text-xl md:text-2xl max-w-2xl leading-relaxed mb-10 italic">
            "Hey, I'm Tejas Jaware. Here, you can check out what I'm working on. I try my best to create things with 🖤"
        </p>

        <div class="hero-element flex flex-wrap gap-5 text-[#5a5a5a]">
            <a href="https://github.com/tejuas98" target="_blank" rel="noopener noreferrer" class="hover:text-[#1a1a1a] transition-colors duration-200">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.2c3-.3 6-1.5 6-6.5a4.6 4.6 0 0 0-1.3-3.2 4.2 4.2 0 0 0-.1-3.2s-1.1-.3-3.5 1.3a12.3 12.3 0 0 0-6.2 0C6.5 2.8 5.4 3.1 5.4 3.1a4.2 4.2 0 0 0-.1 3.2A4.6 4.6 0 0 0 4 9.5c0 5 3 6.2 6 6.5a4.8 4.8 0 0 0-1 3.2v4"></path></svg>
            </a>
            <a href="https://www.linkedin.com/in/tejus98" target="_blank" rel="noopener noreferrer" class="hover:text-[#1a1a1a] transition-colors duration-200">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
            </a>
            <a href="https://x.com/tejus_98" target="_blank" rel="noopener noreferrer" class="hover:text-[#1a1a1a] transition-colors duration-200">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M4 4l11.733 16h4.267l-11.733 -16z"></path><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"></path></svg>
            </a>
            <a href="https://www.instagram.com/tejus.98/" target="_blank" rel="noopener noreferrer" class="hover:text-[#1a1a1a] transition-colors duration-200">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            </a>
            <a href="https://www.youtube.com/@tejus_98" target="_blank" rel="noopener noreferrer" class="hover:text-[#1a1a1a] transition-colors duration-200">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg>
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        const startBtn = document.getElementById("start-btn");
        const overlay = document.getElementById("intro-overlay");

        // Setup initial hidden state for portfolio content
        gsap.set(".hero-element", { y: 50, opacity: 0 });

        startBtn.addEventListener("click", () => {
            // Animate overlay out
            gsap.to(overlay, {
                y: "-100%",
                duration: 1,
                ease: "power4.inOut",
                onComplete: () => {
                    overlay.remove();
                    // Animate portfolio items in
                    gsap.to(".hero-element", {
                        y: 0,
                        opacity: 1,
                        duration: 1.2,
                        stagger: 0.15,
                        ease: "power4.out"
                    });
                }
            });
        });
    </script>
</body>
</html>
